<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/timeline.css">
    <!-- <link rel="stylesheet" href="styles/milestones.css"> -->
    <link rel="stylesheet" href="styles/countdown.css">
    <link rel="stylesheet" href="styles/contact_card.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div id="top_bar">
        <div id="reverse_Counter">
            <p id="countdown">14days: 12hrs: 30mins: 56sec</p>
            <p id="current_milestone">Till Milestone 1 Submition</p>
        </div>

        <div id="contacts_btn">
            <div class="contacts-trigger" id="contactsBtn">
                <span class="btn-icon">
                    <i class="ti ti-mail" aria-hidden="true"></i>
                </span>
                Contacts
            </div>

            <div class="popup_card">
                <div class="-a">
                    <div class="card-a-head">
                    <i class="ti ti-address-book" aria-hidden="true"></i>
                    <h3>Course team</h3>
                    </div>
                    <div class="card-a-row">
                    <div class="avatar av-orange">SA</div>
                    <div class="card-a-row-info"><p>Shyam Anand</p><span>Instructor</span></div>
                    <a href="mailto:shyam@study.iitm.ac.in"><i class="ti ti-mail" style="font-size:15px"></i></a>
                    </div>
                    <div class="card-a-row">
                    <div class="avatar av-orange">SN</div>
                    <div class="card-a-row-info"><p>Saranya Nayak</p><span>Teaching assistant</span></div>
                    <a href="mailto:21f005170@ds.study.iitm.ac.in"><i class="ti ti-mail" style="font-size:15px"></i></a>
                    </div>
                    <div class="divider-label">Campus support</div>
                    <div class="card-a-row">
                    <div class="avatar av-gray"><i class="ti ti-building" style="font-size:15px"></i></div>
                    <div class="card-a-row-info"><p>Campus support</p><span>Portal, exams, add/drop</span></div>
                    <a href="mailto:campus-support@study.iitm.ac.in"><i class="ti ti-mail" style="font-size:15px"></i></a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="flex-container">
        <div id="timeline_bar">
            <div class="header">
                <div class="header-label">Project Timeline</div>
                <div class="header-dates"></div>
            </div>
            <div class="pogress">
                <div id="timeline">
                    <div id="pogress_bar"></div>
                </div>
            </div>
        </div>
        <div id="main_content"></div>
    </div>
</body>
<script src="scripts/timeline.js" type="module"></script>
<script src="scripts/pogress_bar.js" type="module"></script>
<script src="scripts/nav.js" type="module"></script>
<script src="scripts/countdown.js" type="module"></script>
</html>
